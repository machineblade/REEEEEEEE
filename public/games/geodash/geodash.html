<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Mini Dash + Level Editor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            height: 100%;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .overlay-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #1a003a 0%, #000010 70%);
            z-index: 0;
        }

        .overlay-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 0, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScroll 4s linear infinite;
            pointer-events: none;
        }

        @keyframes gridScroll {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 60px 60px;
            }
        }

        .menu-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0ff, 0 0 100px #f0f;
            animation: pulse 2.5s ease-in-out infinite;
            margin-bottom: 8px;
            z-index: 1;
        }

        .menu-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 6px;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
            margin-bottom: 50px;
            z-index: 1;
        }

        @keyframes pulse {

            0%,
            100% {
                text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0ff, 0 0 100px #f0f;
            }

            50% {
                text-shadow: 0 0 20px #0ff, 0 0 50px #0ff, 0 0 90px #0ff, 0 0 140px #f0f;
            }
        }

        .main-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        .big-play-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 56px;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: transparent;
            border: 3px solid #0ff;
            color: #0ff;
            cursor: pointer;
            position: relative;
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
            transition: all 0.2s ease;
        }

        .big-play-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #0ff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s ease;
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
        }

        .big-play-btn:hover::before {
            transform: scaleX(1);
        }

        .big-play-btn:hover {
            color: #000;
        }

        .big-play-btn>* {
            position: relative;
            z-index: 1;
        }

        .wrench-btn {
            width: 64px;
            height: 64px;
            background: transparent;
            border: 2px solid #f0f;
            color: #f0f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            transition: all 0.2s;
        }

        .wrench-btn:hover {
            background: #f0f;
            color: #000;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #0ff;
            box-shadow: 0 0 6px #0ff;
            animation: float linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) translateX(0);
                opacity: 1;
            }

            to {
                transform: translateY(-10vh) translateX(40px);
                opacity: 0;
            }
        }

        .ls-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 20px #0ff;
            z-index: 1;
            margin-bottom: 40px;
        }

        .ls-back {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            background: transparent;
            border: 1px solid #f0f;
            color: #f0f;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ls-back:hover {
            background: #f0f;
            color: #000;
        }

        .ls-viewport {
            width: 100vw;
            overflow: hidden;
            z-index: 1;
        }

        .ls-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ls-card {
            min-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .ls-card-inner {
            width: 420px;
            padding: 40px;
            border: 2px solid #0ff;
            background: rgba(0, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .ls-card-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 5px;
            color: #0ff;
            opacity: 0.6;
        }

        .ls-card-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 20px #0ff;
        }

        .ls-card-desc {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            letter-spacing: 1px;
        }

        .ls-play-btn {
            margin-top: 8px;
            padding: 14px 44px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            letter-spacing: 4px;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .ls-play-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #0ff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s;
        }

        .ls-play-btn:hover::before {
            transform: scaleX(1);
        }

        .ls-play-btn:hover {
            color: #000;
        }

        .ls-play-btn span {
            position: relative;
            z-index: 1;
        }

        .ls-arrows {
            position: absolute;
            bottom: 36px;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 1;
        }

        .ls-arrow {
            width: 52px;
            height: 52px;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ls-arrow:hover {
            background: #0ff;
            color: #000;
        }

        .ls-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ls-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            border: 1px solid #0ff;
            transition: all 0.2s;
            cursor: pointer;
        }

        .ls-dot.active {
            background: #0ff;
            box-shadow: 0 0 8px #0ff;
        }

        .ws-buttons {
            display: flex;
            gap: 24px;
            z-index: 1;
        }

        .ws-btn {
            width: 180px;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            background: rgba(255, 0, 255, 0.05);
            border: 2px solid #f0f;
            color: #f0f;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
        }

        .ws-btn:hover {
            background: #f0f;
            color: #000;
        }

        .folder-body {
            z-index: 1;
            width: 420px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .folder-import {
            display: flex;
            gap: 8px;
        }

        .folder-import input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .folder-import input::placeholder {
            color: rgba(0, 255, 255, 0.3);
        }

        .folder-list {
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .folder-list::-webkit-scrollbar {
            width: 4px;
        }

        .folder-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .folder-list::-webkit-scrollbar-thumb {
            background: #f0f;
            border-radius: 2px;
        }

        .import-btn {
            padding: 10px 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .import-btn:hover {
            background: #0ff;
            color: #000;
        }

        .lvl-row {
            display: flex;
            gap: 4px;
            width: 100%;
        }

        .lvl-play {
            flex: 1;
            padding: 8px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid #f0f;
            color: #f0f;
            cursor: pointer;
            transition: all 0.2s;
            width: auto !important;
        }

        .lvl-play:hover {
            background: #f0f;
            color: #000;
        }

        .lvl-icon-btn {
            width: 32px !important;
            flex-shrink: 0;
            padding: 0 !important;
            background: transparent !important;
            border: 1px solid #444 !important;
            color: #888 !important;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0 !important;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lvl-icon-btn.edit:hover {
            border-color: #0ff !important;
            color: #0ff !important;
            background: rgba(0, 255, 255, 0.1) !important;
        }

        .lvl-icon-btn.del:hover {
            border-color: #f44 !important;
            color: #f44 !important;
            background: rgba(255, 60, 60, 0.1) !important;
        }
    </style>
</head>

<body>
    <canvas id="game"></canvas>

    <!-- MAIN MENU -->
    <div id="menu" class="overlay" style="display:flex">
        <div class="overlay-bg"></div>
        <div class="particle"
            style="left:10%;animation-duration:6s;animation-delay:0s;background:#f0f;box-shadow:0 0 6px #f0f"></div>
        <div class="particle" style="left:25%;animation-duration:8s;animation-delay:1s"></div>
        <div class="particle"
            style="left:40%;animation-duration:5s;animation-delay:2s;background:#f0f;box-shadow:0 0 6px #f0f"></div>
        <div class="particle" style="left:60%;animation-duration:9s;animation-delay:0.5s"></div>
        <div class="particle"
            style="left:75%;animation-duration:7s;animation-delay:3s;background:#f0f;box-shadow:0 0 6px #f0f"></div>
        <div class="particle" style="left:90%;animation-duration:6s;animation-delay:1.5s"></div>
        <div class="menu-title">Mini Dash</div>
        <div class="menu-subtitle">Geometry Rush</div>
        <div class="main-actions">
            <button class="big-play-btn" onclick="openLevelSelect()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <span>PLAY</span>
            </button>
            <button class="wrench-btn" onclick="openWorkshop()" title="Workshop">
                <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                    <path
                        d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- LEVEL SELECT -->
    <div id="levelSelect" class="overlay" style="display:none">
        <div class="overlay-bg"></div>
        <button class="ls-back" onclick="closeLevelSelect()">&#8592; BACK</button>
        <div class="ls-title">SELECT LEVEL</div>
        <div class="ls-viewport">
            <div class="ls-track" id="lsTrack"></div>
        </div>
        <div class="ls-arrows">
            <button class="ls-arrow" onclick="lsScroll(-1)">&#8592;</button>
            <div class="ls-dots" id="lsDots"></div>
            <button class="ls-arrow" onclick="lsScroll(1)">&#8594;</button>
        </div>
    </div>

    <!-- WORKSHOP -->
    <div id="workshop" class="overlay" style="display:none">
        <div class="overlay-bg"></div>
        <button class="ls-back" onclick="closeWorkshop()">&#8592; BACK</button>
        <div class="ls-title">WORKSHOP</div>
        <div class="ws-buttons">
            <button class="ws-btn" onclick="openFolderUI()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="36" height="36">
                    <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" />
                </svg>
                MY LEVELS
            </button>
            <button class="ws-btn" onclick="openEditorFresh()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="36" height="36">
                    <path
                        d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm21.41-12.12l-3.54-3.54a2 2 0 00-2.83 0l-2.83 2.83 6.37 6.37 2.83-2.83a2 2 0 000-2.83z" />
                </svg>
                NEW LEVEL
            </button>
        </div>
    </div>

    <!-- MY LEVELS -->
    <div id="folderUI" class="overlay" style="display:none">
        <div class="overlay-bg"></div>
        <button class="ls-back" onclick="closeFolderUI()">&#8592; BACK</button>
        <div class="ls-title">MY LEVELS</div>
        <div class="folder-body">
            <div class="folder-import">
                <input id="folderInput" placeholder="Paste level string to add...">
                <button class="import-btn" onclick="folderImport()">ADD</button>
            </div>
            <div id="folderList" class="folder-list"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingQuality = "low";
        ctx.imageSmoothingEnabled = false;

        const blockSprite = new Image(); blockSprite.src = "./sprites/block.png";
        const jumppadsprite = new Image(); jumppadsprite.src = "./sprites/jumppad.png";
        const spikesprite = new Image(); spikesprite.src = "./sprites/spike.png";
        const cubeSprite = new Image(); cubeSprite.src = "./sprites/cubes/cube1.png";
        const shipSprite = new Image(); shipSprite.src = "./sprites/ship.png";
        const waveSprite = new Image(); waveSprite.src = "./sprites/wave1.png";

        function drawShipPortal(x, y, w, h) {
            ctx.shadowColor = "#0ff"; ctx.shadowBlur = 12; ctx.strokeStyle = "#0ff"; ctx.lineWidth = 3; ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0; ctx.fillStyle = "rgba(0,255,255,0.10)"; ctx.fillRect(x, y, w, h);
            let cx = x + w / 2, cy = y + h / 2; ctx.fillStyle = "#0ff"; ctx.beginPath();
            ctx.moveTo(cx + 12, cy); ctx.lineTo(cx - 9, cy - 7); ctx.lineTo(cx - 5, cy); ctx.lineTo(cx - 9, cy + 7);
            ctx.closePath(); ctx.fill(); ctx.font = "bold 9px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("SHIP", cx, y + h - 6); ctx.textAlign = "left";
        }
        function drawWavePortal(x, y, w, h) {
            ctx.shadowColor = "#fa0"; ctx.shadowBlur = 12; ctx.strokeStyle = "#fa0"; ctx.lineWidth = 3; ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0; ctx.fillStyle = "rgba(255,170,0,0.10)"; ctx.fillRect(x, y, w, h);
            let cx = x + w / 2, cy = y + h / 2; ctx.strokeStyle = "#fa0"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(cx - 12, cy); ctx.bezierCurveTo(cx - 6, cy - 8, cx, cy + 8, cx + 6, cy);
            ctx.bezierCurveTo(cx + 9, cy - 5, cx + 12, cy - 2, cx + 12, cy); ctx.stroke();
            ctx.fillStyle = "#fa0"; ctx.font = "bold 9px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("WAVE", cx, y + h - 6); ctx.textAlign = "left";
        }
        function drawCubePortal(x, y, w, h) {
            ctx.shadowColor = "#0f0"; ctx.shadowBlur = 12; ctx.strokeStyle = "#0f0"; ctx.lineWidth = 3; ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0; ctx.fillStyle = "rgba(0,255,0,0.10)"; ctx.fillRect(x, y, w, h);
            let cx = x + w / 2, cy = y + h / 2; ctx.strokeStyle = "#0f0"; ctx.lineWidth = 2; ctx.strokeRect(cx - 8, cy - 8, 16, 16);
            ctx.fillStyle = "rgba(0,255,0,0.3)"; ctx.fillRect(cx - 8, cy - 8, 16, 16);
            ctx.fillStyle = "#0f0"; ctx.font = "bold 9px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("CUBE", cx, y + h - 6); ctx.textAlign = "left";
        }

        let spaceHeld = false, jumpConsumed = false;
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener("resize", resize);

        const SPEED = 6, SIZE = 50, GRAVITY = 0.8, GROUND_Y = 100, ROT_SPEED = 6;
        let mode = "cube";
        const MAX_JUMP_HEIGHT = SIZE * 2.5;
        let state = "menu", scrollX = 0, player, levelObjects = [], particles = [], waveTrail = [];
        let jumpBuffer = 0, restartTimer = 0, finishX = 0, winTimer = 0;

        // 10 built-in levels

        const customLevels = [];

        // ---- LEVEL SELECT ----
        let lsIndex = 0;

        function buildLevelSelect() {
            const allLevels = [...levels.map((l, i) => ({ code: l, meta: levelMeta[i] })),
            ...customLevels.map((l, i) => ({ code: l, meta: { name: "CUSTOM " + (i + 1), desc: "Your creation" } }))];
            const track = document.getElementById("lsTrack");
            const dots = document.getElementById("lsDots");
            track.innerHTML = ""; dots.innerHTML = "";
            allLevels.forEach((lvl, i) => {
                const card = document.createElement("div");
                card.className = "ls-card";
                card.innerHTML = `<div class="ls-card-inner">
                    <div class="ls-card-num">LEVEL ${i + 1} / ${allLevels.length}</div>
                    <div class="ls-card-name">${lvl.meta.name}</div>
                    <div class="ls-card-desc">${lvl.meta.desc}</div>
                    <button class="ls-play-btn" onclick="launchLevel(${i})"><span>&#9654; PLAY</span></button>
                </div>`;
                track.appendChild(card);
                const dot = document.createElement("div");
                dot.className = "ls-dot" + (i === lsIndex ? " active" : "");
                dot.onclick = () => lsGoTo(i);
                dots.appendChild(dot);
            });
            lsGoTo(lsIndex, false);
        }

        function lsGoTo(i, animate = true) {
            const allLen = levels.length + customLevels.length;
            lsIndex = Math.max(0, Math.min(i, allLen - 1));
            const track = document.getElementById("lsTrack");
            track.style.transition = animate ? "transform 0.4s cubic-bezier(0.4,0,0.2,1)" : "none";
            track.style.transform = `translateX(-${lsIndex * 100}vw)`;
            document.querySelectorAll(".ls-dot").forEach((d, j) => d.classList.toggle("active", j === lsIndex));
        }

        function lsScroll(dir) { lsGoTo(lsIndex + dir); }

        function openLevelSelect() {
            lsIndex = 0; buildLevelSelect();
            navPush("levelSelect");
        }
        function closeLevelSelect() { navPop(); }

        function launchLevel(i) {
            const allLevels = [...levels, ...customLevels];
            hideAllOverlays();
            navStack.push("game");
            state = "game"; scrollX = 0; winTimer = 0; restartTimer = 0;
            levelObjects = parseLevel(allLevels[i]); spawnPlayer();
        }

        function openWorkshop() { navPush("workshop"); }
        function closeWorkshop() { navPop(); }

        function openFolderUI() {
            navPush("folderUI");
            renderFolderList();
        }
        function closeFolderUI() { navPop(); }
        function folderImport() {
            let txt = document.getElementById("folderInput").value.trim();
            if (!txt) return;
            customLevels.push(txt);
            document.getElementById("folderInput").value = "";
            renderFolderList();
        }
        function renderFolderList() {
            let div = document.getElementById("folderList");
            div.innerHTML = "";
            if (customLevels.length === 0) {
                div.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-family:Orbitron,sans-serif;font-size:12px;letter-spacing:3px;text-align:center;padding:20px">NO CUSTOM LEVELS YET</div>';
                return;
            }
            customLevels.forEach((lvl, i) => {
                let row = document.createElement("div"); row.className = "lvl-row";
                let play = document.createElement("button"); play.className = "lvl-play";
                play.textContent = "CUSTOM " + (i + 1);
                play.onclick = () => {
                    hideAllOverlays(); navStack.push("game");
                    state = "game"; scrollX = 0; winTimer = 0; restartTimer = 0;
                    levelObjects = parseLevel(customLevels[i]); spawnPlayer();
                };
                let edit = document.createElement("button"); edit.className = "lvl-icon-btn edit";
                edit.title = "Edit"; edit.textContent = "✏️";
                edit.onclick = () => openEditorWithLevel(i);
                let del = document.createElement("button"); del.className = "lvl-icon-btn del";
                del.title = "Delete"; del.textContent = "🗑️";
                del.onclick = () => { customLevels.splice(i, 1); renderFolderList(); };
                row.appendChild(play); row.appendChild(edit); row.appendChild(del);
                div.appendChild(row);
            });
        }

        // ---- NAV STACK ----
        // Each entry is an overlay id (or "game"/"editor"). We always show only the top.
        const navStack = ["menu"];
        const allOverlayIds = ["menu", "levelSelect", "workshop", "folderUI"];

        function hideAllOverlays() {
            allOverlayIds.forEach(id => document.getElementById(id).style.display = "none");
        }

        function showScreen(id) {
            hideAllOverlays();
            if (allOverlayIds.includes(id)) document.getElementById(id).style.display = "flex";
        }

        function navPush(id) {
            navStack.push(id);
            showScreen(id);
        }

        function navPop() {
            // Special cleanup before popping
            const current = navStack[navStack.length - 1];
            if (current === "editor") {
                if (editorEditingIndex >= 0) {
                    let str = editorObjects.map(o => `${o.type} ${o.x} ${o.y} ${o.rotation || 0}`).join(", ");
                    customLevels[editorEditingIndex] = str;
                }
                state = "menu";
            }
            if (current === "game" || current === "dead" || current === "win") {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                state = "menu"; scrollX = 0; levelObjects = []; particles = []; waveTrail = [];
                player = null; winTimer = 0; restartTimer = 0; jumpBuffer = 0;
                spaceHeld = false; jumpConsumed = false;
            }
            if (navStack.length > 1) navStack.pop();
            const prev = navStack[navStack.length - 1];
            if (prev === "folderUI") renderFolderList();
            showScreen(prev);
        }

        // ---- EDITOR ----
        let editorScroll = 0, editorObjects = [], editorType = "block";
        let selectedObj = null, exportNotice = 0, editorEditingIndex = -1;
        const editorButtons = [{ type: "block" }, { type: "spike" }, { type: "jumppad" }, { type: "shipportal" }, { type: "cubeportal" }, { type: "waveportal" }];
        const editorSpawn = { x: 150, y: 0 };

        function openEditorFresh() {
            hideAllOverlays(); navStack.push("editor"); state = "editor";
            editorObjects = []; editorScroll = 0; editorType = "block"; editorEditingIndex = -1;
        }
        function openEditorWithLevel(i) {
            hideAllOverlays(); navStack.push("editor"); state = "editor"; editorScroll = 0; editorType = "block";
            editorObjects = parseLevel(customLevels[i]); editorEditingIndex = i;
        }

        // ---- GAME CORE ----
        function parseLevel(text) {
            let objects = text.split(",").map(o => {
                let [type, x, y, r] = o.trim().split(" ");
                return { type, x: parseInt(x), y: parseInt(y), rotation: parseInt(r) || 0 };
            });
            let maxX = 0; for (let obj of objects) maxX = Math.max(maxX, obj.x);
            finishX = maxX + 150; return objects;
        }

        function goToMenu() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            state = "menu"; scrollX = 0; levelObjects = []; particles = []; waveTrail = [];
            player = null; winTimer = 0; restartTimer = 0; jumpBuffer = 0;
            spaceHeld = false; jumpConsumed = false;
            navStack.length = 0; navStack.push("menu");
            hideAllOverlays();
            document.getElementById("menu").style.display = "flex";
        }

        function spawnPlayer() {
            player = { x: 150, y: canvas.height - GROUND_Y - SIZE, vy: 0, grounded: true, rotation: 0, visible: true };
            mode = "cube"; jumpBuffer = 0; jumpConsumed = false; waveTrail = [];
        }

        function spawnParticles(x, y) {
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2, speed = Math.random() * 8 + 2;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 60 });
            }
        }

        function die() {
            if (state !== "game") return;
            spawnParticles(player.x + SIZE / 2, player.y + SIZE / 2);
            player.visible = false; state = "dead"; restartTimer = 120;
        }

        // ---- INPUT ----
        document.addEventListener("keydown", e => {
            if (e.code === "Space") {
                if (!spaceHeld) { spaceHeld = true; jumpConsumed = false; if (state === "game" && mode === "cube") jumpBuffer = 8; }
            }
            if (e.code === "Escape") {
                navPop();
            }
            if (state === "editor") editorKey(e);
            if (document.getElementById("levelSelect").style.display === "flex") {
                if (e.key === "ArrowLeft" || e.key === "ArrowUp") lsScroll(-1);
                if (e.key === "ArrowRight" || e.key === "ArrowDown") lsScroll(1);
            }
        });
        document.addEventListener("keyup", e => {
            if (e.code === "Space") { spaceHeld = false; jumpConsumed = false; }
        });
        document.addEventListener("mousedown", e => {
            if (state === "game") { if (!spaceHeld) { spaceHeld = true; jumpConsumed = false; if (mode === "cube") jumpBuffer = 8; } }
            if (state === "editor") editorClick(e);
        });
        document.addEventListener("mouseup", e => {
            if (state === "game") { spaceHeld = false; jumpConsumed = false; }
        });
        document.addEventListener("contextmenu", e => {
            if (state === "editor") { e.preventDefault(); editorDelete(e); }
        });
        document.addEventListener("wheel", e => {
            if (document.getElementById("levelSelect").style.display === "flex") {
                lsScroll(e.deltaY > 0 ? 1 : -1);
            }
        });

        // ---- UPDATE ----
        function update() {
            if (state === "dead") { restartTimer--; if (restartTimer <= 0) { spawnPlayer(); scrollX = 0; state = "game"; } }
            if (state === "win") { winTimer--; if (winTimer <= 0) { goToMenu(); return; } }
            for (let p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; }
            particles = particles.filter(p => p.life > 0);
            if (state !== "game") return;

            scrollX += SPEED;
            if (jumpBuffer > 0) jumpBuffer--;
            for (let t of waveTrail) t.x -= SPEED;

            const jumpForce = Math.sqrt(2 * GRAVITY * MAX_JUMP_HEIGHT);

            if (mode === "cube") {
                if (spaceHeld && player.grounded && !jumpConsumed) jumpBuffer = 8;
                if (jumpBuffer > 0 && player.grounded) { player.vy = -jumpForce; jumpBuffer = 0; jumpConsumed = true; }
                player.vy += GRAVITY; player.y += player.vy;
            }
            if (mode === "ship") {
                if (spaceHeld) player.vy -= 0.9; else player.vy += 0.6;
                player.vy *= 0.92;
                if (player.vy < -10) player.vy = -10; if (player.vy > 10) player.vy = 10;
                player.y += player.vy;
                player.rotation = Math.max(-25, Math.min(25, player.vy * 2.5));
                if (player.y <= 0) { player.y = 0; player.vy = 0; }
            }
            if (mode === "wave") {
                player.vy = spaceHeld ? -7 : 7;
                player.y += player.vy;
                player.rotation = spaceHeld ? -45 : 45;
                if (player.y <= 0) { die(); return; }
                if (state === "game") {
                    waveTrail.push({ x: player.x + 25, y: player.y + 25 });
                    if (waveTrail.length > 84) waveTrail.shift();
                }
            }

            let landed = false, ground = canvas.height - GROUND_Y;
            if (player.y + SIZE >= ground) {
                if (mode === "wave") { die(); return; }
                else { player.y = ground - SIZE; player.vy = 0; landed = true; }
            }

            for (let obj of levelObjects) {
                let x = obj.x - scrollX, y = canvas.height - GROUND_Y - obj.y - 50;
                let hx = mode === "ship" ? player.x + 7 : (mode === "wave" ? player.x + 4 : player.x);
                let hy = mode === "ship" ? player.y + 18 : (mode === "wave" ? player.y + 4 : player.y);
                let hw = mode === "ship" ? 33 : (mode === "wave" ? 18 : SIZE);
                let hh = mode === "ship" ? 15 : (mode === "wave" ? 18 : SIZE);

                if (obj.type === "block") {
                    let overlapX = hx + hw > x && hx < x + 50;
                    if (mode === "wave") { if (overlapX && hy + hh > y && hy < y + 50) die(); }
                    else if (overlapX && (hy + hh) - player.vy <= y && hy + hh >= y) {
                        player.y = y - hh - (mode === "ship" ? 18 : 0); player.vy = 0; landed = true;
                    } else if (overlapX && hy + hh > y && hy < y + 50) { die(); }
                }
                if (obj.type === "waveportal") {
                    if (hx + hw > x && hx < x + 50 && hy + hh > y && hy < y + 100 && mode !== "wave") {
                        mode = "wave"; waveTrail = []; player.y = (y + 50) - SIZE / 2; player.vy = 0;
                    }
                }
                if (obj.type === "shipportal") {
                    if (hx + hw > x && hx < x + 50 && hy + hh > y && hy < y + 100) { mode = "ship"; waveTrail = []; }
                }
                if (obj.type === "cubeportal") {
                    if (hx + hw > x && hx < x + 50 && hy + hh > y && hy < y + 100) {
                        mode = "cube"; waveTrail = []; player.rotation = Math.round(player.rotation / 90) * 90;
                    }
                }
                if (obj.type === "spike") {
                    let sX = x + 21, sY = y + 22;
                    if (hx + hw > sX && hx < sX + 6 && hy + hh > sY && hy < sY + 13) die();
                }
                if (obj.type === "jumppad") {
                    if (hx + hw > x && hx < x + 19 && hy + hh > y + 35 && hy < y + 40) {
                        player.vy = -Math.sqrt(2 * GRAVITY * MAX_JUMP_HEIGHT) * 1.4;
                        spawnParticles(player.x + SIZE / 2, player.y + SIZE);
                    }
                }
            }

            if (player.grounded && !landed) jumpConsumed = false;
            player.grounded = landed;
            if (mode === "cube") {
                if (!player.grounded) player.rotation += ROT_SPEED;
                else player.rotation = Math.round(player.rotation / 90) * 90;
            }
            if (player.x + scrollX > finishX) { player.visible = false; state = "win"; winTimer = 120; }
        }

        // ---- DRAW ----
        function drawObj(obj, x, y) {
            ctx.save(); ctx.translate(x + 25, y + 25); ctx.rotate(((obj.rotation || 0) * Math.PI) / 180); ctx.translate(-25, -25);
            if (obj.type === "block") ctx.drawImage(blockSprite, 0, 0, 50, 50);
            if (obj.type === "spike") ctx.drawImage(spikesprite, 0, 0, 50, 50);
            if (obj.type === "jumppad") ctx.drawImage(jumppadsprite, 0, 35, 50, 15);
            if (obj.type === "shipportal") drawShipPortal(0, 0, 50, 100);
            if (obj.type === "cubeportal") drawCubePortal(0, 0, 50, 100);
            if (obj.type === "waveportal") drawWavePortal(0, 0, 50, 100);
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (state === "menu") return;
            if (state === "editor") { drawEditor(); return; }

            ctx.fillStyle = "#0a0015"; ctx.fillRect(0, 0, canvas.width, canvas.height - GROUND_Y);
            ctx.fillStyle = "#0d0030"; ctx.fillRect(0, canvas.height - GROUND_Y, canvas.width, GROUND_Y);
            ctx.shadowColor = "#f0f"; ctx.shadowBlur = 20; ctx.fillStyle = "#f0f";
            ctx.fillRect(0, canvas.height - GROUND_Y, canvas.width, 3); ctx.shadowBlur = 0;

            for (let obj of levelObjects) {
                let x = Math.floor(obj.x - scrollX), y = Math.floor(canvas.height - GROUND_Y - obj.y - 50);
                drawObj(obj, x, y);
            }

            ctx.save(); ctx.shadowColor = "#ff0"; ctx.shadowBlur = 24; ctx.fillStyle = "#ff0";
            ctx.fillRect(finishX - scrollX, 0, 4, canvas.height); ctx.shadowBlur = 0; ctx.restore();

            for (let p of particles) { ctx.globalAlpha = p.life / 60; ctx.fillStyle = "white"; ctx.fillRect(p.x, p.y, 4, 4); }
            ctx.globalAlpha = 1;

            if (mode === "wave") {
                ctx.fillStyle = "white"; ctx.shadowColor = "white"; ctx.shadowBlur = 4;
                for (let t of waveTrail) ctx.fillRect(t.x - 12.5, t.y - 12.5, 25, 25);
                ctx.shadowBlur = 0;
            }

            if (player && player.visible) {
                ctx.save();
                ctx.translate(player.x + SIZE / 2, player.y + SIZE / 2);
                ctx.rotate(player.rotation * Math.PI / 180);
                if (mode === "cube") ctx.drawImage(cubeSprite, -SIZE / 2, -SIZE / 2, SIZE, SIZE);
                else if (mode === "wave") ctx.drawImage(waveSprite, -25, -20, 50, 40);
                else ctx.drawImage(shipSprite, -30, -25, 60, 50);
                ctx.restore();
            }

            if (state === "win") {
                ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.save(); ctx.textAlign = "center";
                ctx.font = "bold 72px Orbitron,sans-serif"; ctx.shadowColor = "#0ff"; ctx.shadowBlur = 40; ctx.fillStyle = "#fff";
                ctx.fillText("LEVEL COMPLETE!", canvas.width / 2, canvas.height / 2 - 20); ctx.shadowBlur = 0;
                ctx.font = "20px Orbitron,sans-serif"; ctx.fillStyle = "#f0f"; ctx.shadowColor = "#f0f"; ctx.shadowBlur = 15;
                ctx.fillText("Returning to menu...", canvas.width / 2, canvas.height / 2 + 40);
                ctx.shadowBlur = 0; ctx.restore(); ctx.textAlign = "left";
            }

            ctx.save(); ctx.font = "bold 13px Orbitron,sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fillText("ESC — MENU", 16, 26); ctx.restore();
        }

        function drawEditor() {
            const gridSize = 50, GRID_Y_OFFSET = 62;
            ctx.fillStyle = "#0a0015"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let offsetX = ((editorScroll % gridSize) + gridSize) % gridSize;
            ctx.strokeStyle = "rgba(255,0,255,0.12)"; ctx.lineWidth = 1;
            for (let x = -offsetX; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            let offsetY = GRID_Y_OFFSET % gridSize;
            for (let y = -offsetY; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
            ctx.save(); ctx.shadowColor = "#f0f"; ctx.shadowBlur = 16; ctx.fillStyle = "#f0f";
            ctx.fillRect(0, canvas.height - GROUND_Y, canvas.width, 3); ctx.shadowBlur = 0; ctx.restore();
            ctx.fillStyle = "#0d0030"; ctx.fillRect(0, canvas.height - GROUND_Y + 3, canvas.width, GROUND_Y);

            for (let obj of editorObjects) {
                let x = Math.floor(obj.x - editorScroll), y = Math.floor(canvas.height - GROUND_Y - obj.y - 50);
                drawObj(obj, x, y);
                if (obj === selectedObj) {
                    ctx.save(); ctx.strokeStyle = "#0ff"; ctx.shadowColor = "#0ff"; ctx.shadowBlur = 12;
                    ctx.lineWidth = 2; ctx.strokeRect(x - 3, y - 3, 56, 56); ctx.shadowBlur = 0; ctx.restore();
                }
            }
            ctx.save(); ctx.shadowColor = "#0ff"; ctx.shadowBlur = 10; ctx.strokeStyle = "#0ff"; ctx.lineWidth = 2;
            ctx.strokeRect(editorSpawn.x - editorScroll, canvas.height - GROUND_Y - editorSpawn.y - 50, 50, 50);
            ctx.shadowBlur = 0; ctx.restore();

            let barY = canvas.height - 80;
            ctx.fillStyle = "rgba(5,0,20,0.95)"; ctx.fillRect(0, barY, canvas.width, 80);
            ctx.save(); ctx.shadowColor = "#f0f"; ctx.shadowBlur = 14; ctx.fillStyle = "#f0f";
            ctx.fillRect(0, barY, canvas.width, 2); ctx.shadowBlur = 0; ctx.restore();

            editorButtons.forEach((b, i) => {
                let bx = 20 + i * 74, by = barY + 14, active = editorType === b.type;
                ctx.fillStyle = active ? "rgba(0,255,255,0.15)" : "rgba(255,255,255,0.03)"; ctx.fillRect(bx, by, 52, 52);
                ctx.save(); ctx.shadowColor = active ? "#0ff" : "#555"; ctx.shadowBlur = active ? 12 : 0;
                ctx.strokeStyle = active ? "#0ff" : "#444"; ctx.lineWidth = 2; ctx.strokeRect(bx, by, 52, 52);
                ctx.shadowBlur = 0; ctx.restore();
                if (b.type === "block") ctx.drawImage(blockSprite, bx + 1, by + 1, 50, 50);
                if (b.type === "spike") ctx.drawImage(spikesprite, bx + 1, by + 1, 50, 50);
                if (b.type === "jumppad") ctx.drawImage(jumppadsprite, bx + 1, by + 36, 50, 15);
                if (b.type === "shipportal") drawShipPortal(bx + 1, by + 6, 50, 40);
                if (b.type === "cubeportal") drawCubePortal(bx + 1, by + 6, 50, 40);
                if (b.type === "waveportal") drawWavePortal(bx + 1, by + 6, 50, 40);
            });

            ctx.save(); ctx.font = "bold 13px Orbitron,sans-serif"; ctx.fillStyle = "#0ff"; ctx.shadowColor = "#0ff"; ctx.shadowBlur = 8;
            ctx.fillText("A/D  SCROLL    RMB  ERASE    Q/E  ROTATE    X  EXPORT    ESC  MENU", 20, barY - 12);
            ctx.shadowBlur = 0; ctx.restore();

            if (exportNotice > 0) {
                exportNotice--; let alpha = Math.min(1, exportNotice / 20);
                ctx.save(); ctx.globalAlpha = alpha; ctx.font = "bold 18px Orbitron,sans-serif";
                ctx.fillStyle = "#0f0"; ctx.shadowColor = "#0f0"; ctx.shadowBlur = 20; ctx.textAlign = "center";
                ctx.fillText("✓ COPIED TO CLIPBOARD", canvas.width / 2, barY - 16);
                ctx.shadowBlur = 0; ctx.textAlign = "left"; ctx.restore();
            }
        }

        function editorClick(e) {
            let barY = canvas.height - 80;
            if (e.clientY > barY) {
                editorButtons.forEach((b, i) => {
                    let bx = 20 + i * 74, by = barY + 14;
                    if (e.clientX > bx && e.clientX < bx + 52 && e.clientY > by && e.clientY < by + 52) editorType = b.type;
                }); return;
            }
            let x = Math.floor((e.clientX + editorScroll) / 50) * 50;
            let y = Math.floor((canvas.height - e.clientY - GROUND_Y) / 50) * 50;
            let hit = editorObjects.find(o => o.x === x && o.y === y);
            if (hit) { selectedObj = hit; } else { selectedObj = null; editorObjects.push({ type: editorType, x, y, rotation: 0 }); }
        }
        function editorDelete(e) {
            let barY = canvas.height - 80; if (e.clientY > barY) return;
            let x = Math.floor((e.clientX + editorScroll) / 50) * 50;
            let y = Math.floor((canvas.height - e.clientY - GROUND_Y) / 50) * 50;
            editorObjects = editorObjects.filter(o => !(o.x === x && o.y === y));
        }
        function editorKey(e) {
            if (e.key === "a" || e.key === "A") editorScroll -= 100;
            if (e.key === "d" || e.key === "D") editorScroll += 100;
            if (e.key === "x" || e.key === "X") {
                let str = editorObjects.map(o => `${o.type} ${o.x} ${o.y} ${o.rotation || 0}`).join(", ");
                navigator.clipboard.writeText(str).then(() => { exportNotice = 120; });
                if (editorEditingIndex >= 0) customLevels[editorEditingIndex] = str;
            }
            if (selectedObj) {
                if (e.key === "q" || e.key === "Q") selectedObj.rotation = ((selectedObj.rotation || 0) - 90 + 360) % 360;
                if (e.key === "e" || e.key === "E") selectedObj.rotation = ((selectedObj.rotation || 0) + 90) % 360;
            }
        }

        function loop() {
            try { update(); draw(); } catch (err) { console.error("Game loop error:", err); goToMenu(); }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
