<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Mini Dash + Level Editor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            height: 100%;
        }

        canvas {
            display: block;
        }

        #menu {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            background: radial-gradient(ellipse at 50% 40%, #1a003a 0%, #000010 70%);
            overflow: hidden;
        }

        #menu::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 0, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScroll 4s linear infinite;
            pointer-events: none;
        }

        @keyframes gridScroll {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 60px 60px;
            }
        }

        .menu-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0ff, 0 0 100px #f0f;
            animation: pulse 2.5s ease-in-out infinite;
            margin-bottom: 8px;
            z-index: 1;
        }

        .menu-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 6px;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
            margin-bottom: 50px;
            z-index: 1;
        }

        @keyframes pulse {

            0%,
            100% {
                text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0ff, 0 0 100px #f0f;
            }

            50% {
                text-shadow: 0 0 20px #0ff, 0 0 50px #0ff, 0 0 90px #0ff, 0 0 140px #f0f;
            }
        }

        .menu-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            z-index: 1;
        }

        .menu-btn {
            padding: 14px 36px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            position: relative;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            transition: all 0.2s ease;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #0ff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s ease;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
        }

        .menu-btn:hover::before {
            transform: scaleX(1);
        }

        .menu-btn:hover {
            color: #000;
            border-color: #0ff;
        }

        .menu-btn span {
            position: relative;
            z-index: 1;
        }

        .menu-btn.pink {
            border-color: #f0f;
            color: #f0f;
        }

        .menu-btn.pink::before {
            background: #f0f;
        }

        .menu-btn.pink:hover {
            color: #000;
        }

        .menu-section {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 340px;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 4px;
            color: #f0f;
            text-shadow: 0 0 8px #f0f;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .import-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        #levelInput {
            flex: 1;
            padding: 10px 14px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            outline: none;
        }

        #levelInput::placeholder {
            color: rgba(0, 255, 255, 0.3);
        }

        .import-btn {
            padding: 10px 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .import-btn:hover {
            background: #0ff;
            color: #000;
        }

        #customLevels {
            width: 100%;
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #customLevels::-webkit-scrollbar {
            width: 4px;
        }

        #customLevels::-webkit-scrollbar-track {
            background: transparent;
        }

        #customLevels::-webkit-scrollbar-thumb {
            background: #f0f;
            border-radius: 2px;
        }

        #customLevels button {
            width: 100%;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid #f0f;
            color: #f0f;
            cursor: pointer;
            transition: all 0.2s;
        }

        #customLevels button:hover {
            background: #f0f;
            color: #000;
        }

        .lvl-row {
            display: flex;
            gap: 4px;
            width: 100%;
        }

        .lvl-play {
            flex: 1;
            padding: 8px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid #f0f;
            color: #f0f;
            cursor: pointer;
            transition: all 0.2s;
            width: auto !important;
        }

        .lvl-play:hover {
            background: #f0f;
            color: #000;
        }

        .lvl-icon-btn {
            width: 32px !important;
            height: auto;
            flex-shrink: 0;
            padding: 0 !important;
            background: transparent !important;
            border: 1px solid #444 !important;
            color: #888 !important;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0 !important;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lvl-icon-btn.edit:hover {
            border-color: #0ff !important;
            color: #0ff !important;
            background: rgba(0, 255, 255, 0.1) !important;
        }

        .lvl-icon-btn.del:hover {
            border-color: #f44 !important;
            color: #f44 !important;
            background: rgba(255, 60, 60, 0.1) !important;
        }

        .divider {
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #f0f, transparent);
            margin: 24px 0;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #0ff;
            box-shadow: 0 0 6px #0ff;
            animation: float linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) translateX(0);
                opacity: 1;
            }

            to {
                transform: translateY(-10vh) translateX(40px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <canvas id="game"></canvas>
    <div id="menu">
        <div class="particle"
            style="left:10%;animation-duration:6s;animation-delay:0s;background:#f0f;box-shadow:0 0 6px #f0f"></div>
        <div class="particle" style="left:25%;animation-duration:8s;animation-delay:1s"></div>
        <div class="particle"
            style="left:40%;animation-duration:5s;animation-delay:2s;background:#f0f;box-shadow:0 0 6px #f0f"></div>
        <div class="particle" style="left:60%;animation-duration:9s;animation-delay:0.5s"></div>
        <div class="particle"
            style="left:75%;animation-duration:7s;animation-delay:3s;background:#f0f;box-shadow:0 0 6px #f0f"></div>
        <div class="particle" style="left:90%;animation-duration:6s;animation-delay:1.5s"></div>

        <div class="menu-title">Mini Dash</div>
        <div class="menu-subtitle">Geometry Rush</div>

        <div class="menu-buttons">
            <button class="menu-btn" onclick="startLevel(0)"><span>Level 1</span></button>
            <button class="menu-btn" onclick="startLevel(1)"><span>Level 2</span></button>
            <button class="menu-btn pink" onclick="openEditor()"><span>Editor</span></button>
        </div>

        <div class="divider"></div>

        <div class="menu-section">
            <div class="section-label">Import Level</div>
            <div class="import-row">
                <input id="levelInput" placeholder="Paste level string...">
                <button class="import-btn" onclick="importLevel()">Add</button>
            </div>
            <div class="section-label" style="margin-top:12px">Custom Levels</div>
            <div id="customLevels"></div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingQuality = "low";
        ctx.imageSmoothingEnabled = false;

        const blockSprite = new Image();
        blockSprite.src = "./sprites/block.png";
        const jumppadsprite = new Image();
        jumppadsprite.src = "./sprites/jumppad.png";
        const spikesprite = new Image();
        spikesprite.src = "./sprites/spike.png";
        const cubeSprite = new Image();
        cubeSprite.src = "./sprites/cubes/cube1.png";
        const shipSprite = new Image();
        shipSprite.src = "./sprites/ship.png";
        const waveSprite = new Image();
        waveSprite.src = "./sprites/wave1.png";

        function drawShipPortal(x, y, w, h) {
            ctx.shadowColor = "#0ff";
            ctx.shadowBlur = 12;
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(0,255,255,0.10)";
            ctx.fillRect(x, y, w, h);
            let cx = x + w / 2, cy = y + h / 2;
            ctx.fillStyle = "#0ff";
            ctx.beginPath();
            ctx.moveTo(cx + 12, cy);
            ctx.lineTo(cx - 9, cy - 7);
            ctx.lineTo(cx - 5, cy);
            ctx.lineTo(cx - 9, cy + 7);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#0ff";
            ctx.font = "bold 9px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("SHIP", cx, y + h - 6);
            ctx.textAlign = "left";
        }

        function drawWavePortal(x, y, w, h) {
            ctx.shadowColor = "#fa0";
            ctx.shadowBlur = 12;
            ctx.strokeStyle = "#fa0";
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(255,170,0,0.10)";
            ctx.fillRect(x, y, w, h);
            let cx = x + w / 2, cy = y + h / 2;
            // Draw a small wave squiggle icon
            ctx.strokeStyle = "#fa0";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - 12, cy);
            ctx.bezierCurveTo(cx - 6, cy - 8, cx, cy + 8, cx + 6, cy);
            ctx.bezierCurveTo(cx + 9, cy - 5, cx + 12, cy - 2, cx + 12, cy);
            ctx.stroke();
            ctx.fillStyle = "#fa0";
            ctx.font = "bold 9px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("WAVE", cx, y + h - 6);
            ctx.textAlign = "left";
        }

        function drawCubePortal(x, y, w, h) {
            ctx.shadowColor = "#0f0";
            ctx.shadowBlur = 12;
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(0,255,0,0.10)";
            ctx.fillRect(x, y, w, h);
            let cx = x + w / 2, cy = y + h / 2;
            // Draw a small cube icon
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 2;
            ctx.strokeRect(cx - 8, cy - 8, 16, 16);
            ctx.fillStyle = "rgba(0,255,0,0.3)";
            ctx.fillRect(cx - 8, cy - 8, 16, 16);
            ctx.fillStyle = "#0f0";
            ctx.font = "bold 9px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("CUBE", cx, y + h - 6);
            ctx.textAlign = "left";
        }

        // --- Input state ---
        let spaceHeld = false;
        let jumpConsumed = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        const SPEED = 6;
        const SIZE = 50;
        const GRAVITY = 0.8;
        const GROUND_Y = 100;
        const ROT_SPEED = 6;
        let mode = "cube";
        const MAX_JUMP_HEIGHT = SIZE * 2.5;

        let state = "menu";
        let scrollX = 0;
        let player;
        let levelObjects = [];
        let particles = [];
        let waveTrail = [];
        let jumpBuffer = 0;
        let restartTimer = 0;
        let finishX = 0;
        let winTimer = 0;

        const levels = [
            "spike 550 0 0, spike 1100 0 0, spike 1150 0 0, spike 1200 0 0, spike 1250 0 0, spike 1300 0 0, block 1050 0 0, block 1200 100 0, block 1250 100 0, spike 1350 0 0, spike 1800 0 0, spike 1850 0 0, block 1900 0 0, block 1950 0 0, block 2000 0 0, block 2050 0 0, spike 2100 0 0, spike 2150 0 0, spike 2200 0 0, block 2250 0 0, block 2300 0 0, block 2400 50 0, block 2450 50 0, block 2550 100 0, block 2600 100 0, spike 2650 100 90, spike 2450 0 180, spike 2400 0 180, spike 2550 50 180, spike 2600 50 180, spike 2500 50 90, block 2750 150 0, block 2800 150 0, block 2950 250 0, spike 2950 300 0, block 2900 100 0, block 2950 100 0, block 3000 100 0, block 3050 100 0, block 3100 100 0, block 3050 350 0, block 3050 300 0, block 3050 250 0, block 3100 250 0, block 3150 250 0, block 3200 250 0, block 3200 200 0, block 3250 200 0, block 3150 100 0, block 3200 100 0, block 3250 100 0, block 3300 100 0, block 3350 100 0, block 3400 100 0, block 3300 200 0, block 3350 200 0, block 3400 200 0, block 3450 250 0, block 3500 250 0, block 3450 200 0, block 3450 100 0, block 3550 100 0, block 3500 100 0, block 3550 250 0, shipportal 3550 200 0, block 3550 50 0, block 3550 0 0, spike 3900 0 0, spike 3850 0 0, block 3800 0 0, spike 3950 0 0, spike 4000 0 0, spike 4050 0 0, spike 4100 0 0, spike 4150 0 0, spike 4200 0 0, spike 4250 0 0, spike 4300 0 0, spike 4300 300 180, spike 4250 300 180, spike 4200 300 180, spike 4150 300 180, spike 4100 300 180, spike 4050 300 180, spike 4000 300 180, spike 3950 300 180, spike 3900 300 180, spike 3850 300 180, block 3800 300 0, block 4350 0 0, block 4350 350 0, block 4300 350 0, block 4200 350 0, block 4250 350 0, block 4150 350 0, block 4100 350 0, block 4050 350 0, block 4000 350 0, block 3950 350 0, block 3900 350 0, block 3850 350 0, block 3800 350 0, block 3750 350 0, block 3700 350 0, block 3650 350 0, block 3600 350 0, block 3550 350 0, block 3550 300 0, block 4550 350 0, block 4600 350 0, block 4650 350 0, block 4700 350 0, block 4350 400 0, block 4350 450 0, block 4350 550 0, block 4350 500 0, block 4400 550 0, block 4450 550 0, block 4500 550 0, block 4550 550 0, block 4600 550 0, block 4650 550 0, block 4700 550 0, block 4750 550 0, block 4800 550 0, block 4850 550 0, block 4750 350 0, block 4800 350 0, block 4850 350 0, spike 4600 400 0, spike 4800 500 180, block 4900 350 0, block 4900 550 0, spike 4950 400 0, spike 4950 500 180, block 4950 350 0, block 4950 550 0, block 4550 0 0, block 4600 50 0, block 4650 100 0, block 4700 150 0, block 4750 150 0, block 4800 150 0, block 4850 100 0, block 4900 50 0, block 4950 0 0, block 5000 300 0, block 5050 250 0, block 5100 200 0, block 5150 150 0, block 5200 150 0, block 5250 150 0, block 5300 200 0, block 5350 250 0, block 5400 300 0, block 5000 350 0, block 5050 350 0, block 5100 350 0, block 5150 350 0, block 5200 350 0, block 5250 350 0, block 5300 350 0, block 5350 350 0, block 5400 350 0, block 5000 550 0, block 5050 550 0, block 5100 550 0, block 5150 550 0, cubeportal 5150 450 0, cubeportal 5150 500 0, spike 5400 400 0, spike 5350 400 0, block 5150 600 0, block 5200 600 0, block 5250 600 0, block 5300 600 0, block 5350 600 0, block 5400 600 0",
            "block 400 -3, block 450 -3, spike 500 -3, spike 550 -3"
        ];
        const customLevels = [];

        function parseLevel(text) {
            let objects = text.split(",").map(o => {
                let [type, x, y, r] = o.trim().split(" ");
                return { type, x: parseInt(x), y: parseInt(y), rotation: parseInt(r) || 0 };
            });
            let maxX = 0;
            for (let obj of objects) maxX = Math.max(maxX, obj.x);
            finishX = maxX + 150;
            return objects;
        }

        function goToMenu() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            state = "menu";
            scrollX = 0;
            levelObjects = [];
            particles = [];
            waveTrail = [];
            player = null;
            winTimer = 0;
            restartTimer = 0;
            jumpBuffer = 0;
            spaceHeld = false;
            jumpConsumed = false;
            document.getElementById("menu").style.display = "flex";
        }

        function startLevel(i) {
            document.getElementById("menu").style.display = "none";
            state = "game";
            scrollX = 0;
            winTimer = 0;
            restartTimer = 0;
            levelObjects = parseLevel(levels[i]);
            spawnPlayer();
        }

        function startCustomLevel(i) {
            document.getElementById("menu").style.display = "none";
            state = "game";
            scrollX = 0;
            winTimer = 0;
            restartTimer = 0;
            levelObjects = parseLevel(customLevels[i]);
            spawnPlayer();
        }

        function spawnPlayer() {
            player = {
                x: 150,
                y: canvas.height - GROUND_Y - SIZE,
                vy: 0,
                grounded: true,
                rotation: 0,
                visible: true
            };
            mode = "cube";
            jumpBuffer = 0;
            jumpConsumed = false;
            waveTrail = [];
        }

        function importLevel() {
            let txt = document.getElementById("levelInput").value.trim();
            if (!txt) return;
            customLevels.push(txt);
            document.getElementById("levelInput").value = "";
            updateCustomLevels();
        }

        function openEditorWithLevel(i) {
            document.getElementById("menu").style.display = "none";
            state = "editor";
            editorScroll = 0;
            editorType = "block";
            editorObjects = parseLevel(customLevels[i]);
            // Store index so export can overwrite it
            editorEditingIndex = i;
        }

        function updateCustomLevels() {
            let div = document.getElementById("customLevels");
            div.innerHTML = "";
            customLevels.forEach((lvl, i) => {
                let row = document.createElement("div");
                row.className = "lvl-row";

                let play = document.createElement("button");
                play.className = "lvl-play";
                play.textContent = "Level " + (i + 3);
                play.onclick = () => startCustomLevel(i);

                let edit = document.createElement("button");
                edit.className = "lvl-icon-btn edit";
                edit.title = "Edit";
                edit.textContent = "✏️";
                edit.onclick = () => openEditorWithLevel(i);

                let del = document.createElement("button");
                del.className = "lvl-icon-btn del";
                del.title = "Delete";
                del.textContent = "🗑️";
                del.onclick = () => {
                    customLevels.splice(i, 1);
                    updateCustomLevels();
                };

                row.appendChild(play);
                row.appendChild(edit);
                row.appendChild(del);
                div.appendChild(row);
            });
        }

        function spawnParticles(x, y) {
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 8 + 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 60
                });
            }
        }

        function die() {
            if (state !== "game") return;
            spawnParticles(player.x + SIZE / 2, player.y + SIZE / 2);
            player.visible = false;
            state = "dead";
            restartTimer = 120;
        }

        document.addEventListener("keydown", e => {
            if (e.code === "Space") {
                if (!spaceHeld) {
                    spaceHeld = true;
                    jumpConsumed = false;
                    if (state === "game" && mode === "cube") jumpBuffer = 8;
                }
            }
            if (e.code === "Escape") {
                if (state === "editor" && editorEditingIndex >= 0) {
                    let str = editorObjects.map(o => `${o.type} ${o.x} ${o.y} ${o.rotation || 0}`).join(", ");
                    customLevels[editorEditingIndex] = str;
                    updateCustomLevels();
                }
                goToMenu();
            }
            if (state === "editor") editorKey(e);
        });

        document.addEventListener("keyup", e => {
            if (e.code === "Space") {
                spaceHeld = false;
                jumpConsumed = false;
            }
        });

        document.addEventListener("mousedown", e => {
            if (state === "game") {
                if (!spaceHeld) {
                    spaceHeld = true;
                    jumpConsumed = false;
                    if (mode === "cube") jumpBuffer = 8;
                }
            }
            if (state === "editor") editorClick(e);
        });

        document.addEventListener("mouseup", e => {
            if (state === "game") {
                spaceHeld = false;
                jumpConsumed = false;
            }
        });

        document.addEventListener("contextmenu", e => {
            if (state === "editor") {
                e.preventDefault();
                editorDelete(e);
            }
        });

        function update() {
            if (state === "dead") {
                restartTimer--;
                if (restartTimer <= 0) {
                    spawnPlayer();
                    scrollX = 0;
                    state = "game";
                }
            }

            if (state === "win") {
                winTimer--;
                if (winTimer <= 0) {
                    goToMenu();
                    return;
                }
            }

            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life--;
            }
            particles = particles.filter(p => p.life > 0);

            if (state !== "game") return;

            scrollX += SPEED;
            if (jumpBuffer > 0) jumpBuffer--;

            // Scroll wave trail with camera
            for (let t of waveTrail) t.x -= SPEED;

            let jumpForce = Math.sqrt(2 * GRAVITY * MAX_JUMP_HEIGHT);

            if (mode === "cube") {
                if (spaceHeld && player.grounded && !jumpConsumed) {
                    jumpBuffer = 8;
                }

                if (jumpBuffer > 0 && player.grounded) {
                    player.vy = -jumpForce;
                    jumpBuffer = 0;
                    jumpConsumed = true;
                }

                player.vy += GRAVITY;
                player.y += player.vy;
            }

            if (mode === "ship") {
                const SHIP_ACCEL = 0.9;
                const SHIP_GRAVITY = 0.6;
                const SHIP_MAX_UP = -10;
                const SHIP_MAX_DOWN = 10;
                const DAMPING = 0.92;

                if (spaceHeld) {
                    player.vy -= SHIP_ACCEL;
                } else {
                    player.vy += SHIP_GRAVITY;
                }
                player.vy *= DAMPING;
                if (player.vy < SHIP_MAX_UP) player.vy = SHIP_MAX_UP;
                if (player.vy > SHIP_MAX_DOWN) player.vy = SHIP_MAX_DOWN;
                player.y += player.vy;
                player.rotation = Math.max(-25, Math.min(25, player.vy * 2.5));
                if (player.y <= 0) { player.y = 0; player.vy = 0; }
            }

            if (mode === "wave") {
                // True wave: moves diagonally up when held, down when not
                const WAVE_SPEED = 7;
                if (spaceHeld) {
                    player.vy = -WAVE_SPEED;
                } else {
                    player.vy = WAVE_SPEED;
                }
                player.y += player.vy;
                player.rotation = spaceHeld ? -45 : 45;
                if (player.y <= 0) { player.y = 0; }

                // Record trail point at player center
                waveTrail.push({ x: player.x + 25, y: player.y + 25 });
                const TRAIL_MAX = 84;
                if (waveTrail.length > TRAIL_MAX) waveTrail.shift();
            }

            let landed = false;
            let ground = canvas.height - GROUND_Y;
            if (player.y + SIZE >= ground) {
                if (mode === "wave") {
                    die();
                } else {
                    player.y = ground - SIZE;
                    player.vy = 0;
                    landed = true;
                }
            }

            for (let obj of levelObjects) {
                let x = obj.x - scrollX;
                let y = canvas.height - GROUND_Y - obj.y - 50;

                let hx = mode === "ship" ? player.x + 7 : (mode === "wave" ? player.x + 4 : player.x);
                let hy = mode === "ship" ? player.y + 18 : (mode === "wave" ? player.y + 4 : player.y);
                let hw = mode === "ship" ? 33 : (mode === "wave" ? 18 : SIZE);
                let hh = mode === "ship" ? 15 : (mode === "wave" ? 18 : SIZE);

                if (obj.type === "block") {
                    let overlapX = hx + hw > x && hx < x + 50;
                    let prevBottom = (hy + hh) - player.vy;
                    let playerBottom = hy + hh;
                    if (overlapX && prevBottom <= y && playerBottom >= y) {
                        player.y = y - hh - (mode === "ship" ? 18 : (mode === "wave" ? 4 : 0));
                        player.vy = 0;
                        landed = true;
                    } else if (overlapX && hy + hh > y && hy < y + 50) {
                        die();
                    }
                }

                if (obj.type === "waveportal") {
                    let overlap =
                        hx + hw > x && hx < x + 50 &&
                        hy + hh > y && hy < y + 100;
                    if (overlap) {
                        mode = "wave";
                        waveTrail = [];
                        // Center player vertically in the portal (portal center - half player size)
                        player.y = (y + 50) - SIZE / 2;
                        player.vy = 0;
                    }
                }

                if (obj.type === "shipportal") {
                    let overlap =
                        hx + hw > x && hx < x + 50 &&
                        hy + hh > y && hy < y + 100;
                    if (overlap) { mode = "ship"; waveTrail = []; }
                }

                if (obj.type === "cubeportal") {
                    let overlap =
                        hx + hw > x && hx < x + 50 &&
                        hy + hh > y && hy < y + 100;
                    if (overlap) {
                        mode = "cube";
                        waveTrail = [];
                        player.rotation = Math.round(player.rotation / 90) * 90;
                    }
                }

                if (obj.type === "spike") {
                    let spikeHitX = x + 21, spikeHitY = y + 22;
                    let overlap =
                        hx + hw > spikeHitX && hx < spikeHitX + 6 &&
                        hy + hh > spikeHitY && hy < spikeHitY + 13;
                    if (overlap) die();
                }

                if (obj.type === "jumppad") {
                    if (
                        hx + hw > x && hx < x + 19 &&
                        hy + hh > y + 35 && hy < y + 40
                    ) {
                        player.vy = -Math.sqrt(2 * GRAVITY * MAX_JUMP_HEIGHT) * 1.4;
                        spawnParticles(player.x + SIZE / 2, player.y + SIZE);
                    }
                }
            }

            if (player.grounded && !landed) {
                jumpConsumed = false;
            }

            player.grounded = landed;

            if (mode === "cube") {
                if (!player.grounded) player.rotation += ROT_SPEED;
                else player.rotation = Math.round(player.rotation / 90) * 90;
            }

            if (player.x + scrollX > finishX) {
                player.visible = false;
                state = "win";
                winTimer = 120;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state === "menu") return;

            if (state === "editor") {
                drawEditor();
                return;
            }

            ctx.fillStyle = "#0a0015";
            ctx.fillRect(0, 0, canvas.width, canvas.height - GROUND_Y);

            ctx.fillStyle = "#0d0030";
            ctx.fillRect(0, canvas.height - GROUND_Y, canvas.width, GROUND_Y);

            ctx.shadowColor = "#f0f";
            ctx.shadowBlur = 20;
            ctx.fillStyle = "#f0f";
            ctx.fillRect(0, canvas.height - GROUND_Y, canvas.width, 3);
            ctx.shadowBlur = 0;

            for (let obj of levelObjects) {
                let x = Math.floor(obj.x - scrollX);
                let y = Math.floor(canvas.height - GROUND_Y - obj.y - 50);

                ctx.save();
                ctx.translate(x + 25, y + 25);
                ctx.rotate(((obj.rotation || 0) * Math.PI) / 180);
                ctx.translate(-25, -25);
                if (obj.type === "block") ctx.drawImage(blockSprite, 0, 0, 50, 50);
                if (obj.type === "spike") ctx.drawImage(spikesprite, 0, 0, 50, 50);
                if (obj.type === "jumppad") ctx.drawImage(jumppadsprite, 0, 35, 50, 15);
                if (obj.type === "shipportal") drawShipPortal(0, 0, 50, 100);
                if (obj.type === "cubeportal") drawCubePortal(0, 0, 50, 100);
                if (obj.type === "waveportal") drawWavePortal(0, 0, 50, 100);
                ctx.restore();
            }

            ctx.save();
            ctx.shadowColor = "#ff0";
            ctx.shadowBlur = 24;
            ctx.fillStyle = "#ff0";
            ctx.fillRect(finishX - scrollX, 0, 4, canvas.height);
            ctx.shadowBlur = 0;
            ctx.restore();

            for (let p of particles) {
                ctx.globalAlpha = p.life / 60;
                ctx.fillStyle = "white";
                ctx.fillRect(p.x, p.y, 4, 4);
            }
            ctx.globalAlpha = 1;

            // Draw wave trail
            if (mode === "wave") {
                ctx.fillStyle = "white";
                ctx.shadowColor = "white";
                ctx.shadowBlur = 4;
                for (let i = 0; i < waveTrail.length; i++) {
                    let t = waveTrail[i];
                    ctx.fillRect(t.x - 12.5, t.y - 12.5, 25, 25);
                }
                ctx.shadowBlur = 0;
            }

            if (player && player.visible) {
                ctx.save();
                ctx.translate(player.x + SIZE / 2, player.y + SIZE / 2);
                ctx.rotate(player.rotation * Math.PI / 180);
                if (mode === "cube") {
                    ctx.drawImage(cubeSprite, -SIZE / 2, -SIZE / 2, SIZE, SIZE);
                } else if (mode === "wave") {
                    ctx.drawImage(waveSprite, -25, -20, 50, 40);
                } else {
                    ctx.drawImage(shipSprite, -30, -25, 60, 50);
                }
                ctx.restore();
            }

            if (state === "win") {
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.textAlign = "center";
                ctx.font = "bold 72px Orbitron, sans-serif";
                ctx.shadowColor = "#0ff";
                ctx.shadowBlur = 40;
                ctx.fillStyle = "#fff";
                ctx.fillText("LEVEL COMPLETE!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.shadowBlur = 0;

                ctx.font = "20px Orbitron, sans-serif";
                ctx.fillStyle = "#f0f";
                ctx.shadowColor = "#f0f";
                ctx.shadowBlur = 15;
                ctx.fillText("Returning to menu...", canvas.width / 2, canvas.height / 2 + 40);
                ctx.shadowBlur = 0;
                ctx.restore();
                ctx.textAlign = "left";
            }
        }

        // ---- EDITOR ----
        let editorScroll = 0;
        let editorObjects = [];
        let editorType = "block";
        let selectedObj = null;
        let exportNotice = 0;
        let editorEditingIndex = -1;
        const editorButtons = [
            { type: "block" }, { type: "spike" }, { type: "jumppad" }, { type: "shipportal" }, { type: "cubeportal" }, { type: "waveportal" }
        ];
        const editorSpawn = { x: 150, y: 0 };

        function openEditor() {
            document.getElementById("menu").style.display = "none";
            state = "editor";
            editorObjects = [];
            editorScroll = 0;
            editorType = "block";
            editorEditingIndex = -1;
        }

        function drawEditor() {
            const gridSize = 50;
            const GRID_Y_OFFSET = 62;

            ctx.fillStyle = "#0a0015";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let offsetX = editorScroll % gridSize;
            if (offsetX < 0) offsetX += gridSize;
            let offsetY = GRID_Y_OFFSET % gridSize;
            if (offsetY < 0) offsetY += gridSize;

            ctx.strokeStyle = "rgba(255,0,255,0.12)";
            ctx.lineWidth = 1;
            for (let x = -offsetX; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = -offsetY; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.save();
            ctx.shadowColor = "#f0f";
            ctx.shadowBlur = 16;
            ctx.fillStyle = "#f0f";
            ctx.fillRect(0, canvas.height - GROUND_Y, canvas.width, 3);
            ctx.shadowBlur = 0;
            ctx.restore();

            ctx.fillStyle = "#0d0030";
            ctx.fillRect(0, canvas.height - GROUND_Y + 3, canvas.width, GROUND_Y);

            for (let obj of editorObjects) {
                let x = Math.floor(obj.x - editorScroll);
                let y = Math.floor(canvas.height - GROUND_Y - obj.y - 50);

                ctx.save();
                ctx.translate(x + 25, y + 25);
                ctx.rotate(((obj.rotation || 0) * Math.PI) / 180);
                ctx.translate(-25, -25);
                if (obj.type === "block") ctx.drawImage(blockSprite, 0, 0, 50, 50);
                if (obj.type === "spike") ctx.drawImage(spikesprite, 0, 0, 50, 50);
                if (obj.type === "jumppad") ctx.drawImage(jumppadsprite, 0, 35, 50, 15);
                if (obj.type === "shipportal") drawShipPortal(0, 0, 50, 100);
                if (obj.type === "cubeportal") drawCubePortal(0, 0, 50, 100);
                if (obj.type === "waveportal") drawWavePortal(0, 0, 50, 100);
                ctx.restore();

                if (obj === selectedObj) {
                    ctx.save();
                    ctx.strokeStyle = "#0ff";
                    ctx.shadowColor = "#0ff";
                    ctx.shadowBlur = 12;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - 3, y - 3, 56, 56);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            }

            ctx.save();
            ctx.shadowColor = "#0ff";
            ctx.shadowBlur = 10;
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 2;
            ctx.strokeRect(editorSpawn.x - editorScroll, canvas.height - GROUND_Y - editorSpawn.y - 50, 50, 50);
            ctx.shadowBlur = 0;
            ctx.restore();

            let barY = canvas.height - 80;
            ctx.fillStyle = "rgba(5,0,20,0.95)";
            ctx.fillRect(0, barY, canvas.width, 80);
            ctx.save();
            ctx.shadowColor = "#f0f";
            ctx.shadowBlur = 14;
            ctx.fillStyle = "#f0f";
            ctx.fillRect(0, barY, canvas.width, 2);
            ctx.shadowBlur = 0;
            ctx.restore();

            editorButtons.forEach((b, i) => {
                let bx = 20 + i * 74, by = barY + 14;
                let active = editorType === b.type;

                ctx.fillStyle = active ? "rgba(0,255,255,0.15)" : "rgba(255,255,255,0.03)";
                ctx.fillRect(bx, by, 52, 52);

                ctx.save();
                ctx.shadowColor = active ? "#0ff" : "#555";
                ctx.shadowBlur = active ? 12 : 0;
                ctx.strokeStyle = active ? "#0ff" : "#444";
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, 52, 52);
                ctx.shadowBlur = 0;
                ctx.restore();

                if (b.type === "block") ctx.drawImage(blockSprite, bx + 1, by + 1, 50, 50);
                if (b.type === "spike") ctx.drawImage(spikesprite, bx + 1, by + 1, 50, 50);
                if (b.type === "jumppad") ctx.drawImage(jumppadsprite, bx + 1, by + 36, 50, 15);
                if (b.type === "shipportal") drawShipPortal(bx + 1, by + 6, 50, 40);
                if (b.type === "cubeportal") drawCubePortal(bx + 1, by + 6, 50, 40);
                if (b.type === "waveportal") drawWavePortal(bx + 1, by + 6, 50, 40);
            });

            ctx.save();
            ctx.font = "bold 13px Orbitron, sans-serif";
            ctx.fillStyle = "#0ff";
            ctx.shadowColor = "#0ff";
            ctx.shadowBlur = 8;
            ctx.fillText("A/D  SCROLL    RMB  ERASE    Q/E  ROTATE    X  EXPORT    ESC  MENU", 20, barY - 12);
            ctx.shadowBlur = 0;
            ctx.restore();

            if (exportNotice > 0) {
                exportNotice--;
                let alpha = Math.min(1, exportNotice / 20);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.font = "bold 18px Orbitron, sans-serif";
                ctx.fillStyle = "#0f0";
                ctx.shadowColor = "#0f0";
                ctx.shadowBlur = 20;
                ctx.textAlign = "center";
                ctx.fillText("✓ COPIED TO CLIPBOARD", canvas.width / 2, barY - 16);
                ctx.shadowBlur = 0;
                ctx.textAlign = "left";
                ctx.restore();
            }
        }

        function editorClick(e) {
            let barY = canvas.height - 80;
            if (e.clientY > barY) {
                editorButtons.forEach((b, i) => {
                    let x = 20 + i * 74, y = barY + 14;
                    if (e.clientX > x && e.clientX < x + 52 && e.clientY > y && e.clientY < y + 52)
                        editorType = b.type;
                });
                return;
            }
            let x = Math.floor((e.clientX + editorScroll) / 50) * 50;
            let y = Math.floor((canvas.height - e.clientY - GROUND_Y) / 50) * 50;

            let hit = editorObjects.find(o => o.x === x && o.y === y);
            if (hit) {
                selectedObj = hit;
            } else {
                selectedObj = null;
                editorObjects.push({ type: editorType, x, y, rotation: 0 });
            }
        }

        function editorDelete(e) {
            let barY = canvas.height - 80;
            if (e.clientY > barY) return;
            let x = Math.floor((e.clientX + editorScroll) / 50) * 50;
            let y = Math.floor((canvas.height - e.clientY - GROUND_Y) / 50) * 50;
            editorObjects = editorObjects.filter(o => !(o.x === x && o.y === y));
        }

        function editorKey(e) {
            if (e.key === "a" || e.key === "A") editorScroll -= 100;
            if (e.key === "d" || e.key === "D") editorScroll += 100;
            if (e.key === "x" || e.key === "X") {
                let str = editorObjects.map(o => `${o.type} ${o.x} ${o.y} ${o.rotation || 0}`).join(", ");
                navigator.clipboard.writeText(str).then(() => {
                    exportNotice = 120;
                });
                if (editorEditingIndex >= 0) {
                    customLevels[editorEditingIndex] = str;
                }
            }
            if (selectedObj) {
                if (e.key === "q" || e.key === "Q") selectedObj.rotation = ((selectedObj.rotation || 0) - 90 + 360) % 360;
                if (e.key === "e" || e.key === "E") selectedObj.rotation = ((selectedObj.rotation || 0) + 90) % 360;
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
